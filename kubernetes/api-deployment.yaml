apiVersion: apps/v1
kind: Deployment
metadata:
  name: probepilot-api
  namespace: probepilot
  labels:
    app.kubernetes.io/name: probepilot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: probepilot-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: probepilot-api
    spec:
      containers:
        - name: api
          image: probepilot-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: RAG_DATA_DIR
              value: /app/data/rag
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: probepilot-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
